spring:
  application:
    name: gestion_stock

  datasource:
    url: jdbc:mariadb://localhost:3306/gestion_stock_db?createDatabaseIfNotExist=true
    username: root
    password: 789
    driver-class-name: org.mariadb.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true

  jackson:
    default-property-inclusion: non_null

server:
  port: 8080
  servlet:
    context-path: /gestion_stock

logging:
  level:
    com.gestionstock: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

  file:
    name: logs/gestion_stock.log
springdoc:
  api-docs:
    path: /api-docs

  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha